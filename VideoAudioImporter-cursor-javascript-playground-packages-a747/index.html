<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiotool SDK Playground</title>
  <style>
    body { display: flex; flex-direction: column; height: 100vh; margin: 0; background: #1e1e1e; color: white; font-family: sans-serif; }
    
    /* The New Top Bar */
    #top-bar { padding: 10px 15px; background: #2d2d30; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #111; }
    #top-bar input { padding: 6px; width: 280px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; }
    #projects-dropdown { position: relative; }
    #projects-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: 420px;
      max-height: 360px;
      overflow: auto;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      padding: 8px;
      z-index: 20;
    }
    #projects-menu[hidden] { display: none; }
    .project-row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .project-row:hover { background: #242428; }
    .project-title { font-size: 13px; color: #e5e5e5; }
    .project-subtitle { font-size: 12px; color: #a0a0a0; }
    .project-meta { margin-left: auto; font-size: 12px; color: #7c7c7c; }
    
    #main-content { display: flex; flex-grow: 1; height: calc(100vh - 50px); }
    #left-pane { width: 50%; display: flex; flex-direction: column; border-right: 2px solid #333; }
    #right-pane { width: 50%; display: flex; flex-direction: column; }
    
    .toolbar { padding: 10px 15px; background: #252526; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
    .toolbar h3 { margin: 0; font-size: 14px; color: #ccc; font-weight: normal; }
    
    button { background: #007acc; color: white; border: none; padding: 6px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 13px; }
    button:hover { background: #005f9e; }
    button.action-btn { background: #4af626; color: black; }
    button.action-btn:hover { background: #3bdc1b; }
    
    #editor-js { flex-grow: 1; }
    #console-output { height: 200px; background: #111; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 13px; border-top: 1px solid #333; }
    #nexus-ui-container { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; overflow-y: auto; }
  </style>
</head>
<body>

  <!-- TOP BAR: Authentication & Cloud Sync -->
  <div id="top-bar">
    <button id="auth-btn">Login</button>
    <div id="projects-dropdown">
      <button id="list-projects-btn">List Projects</button>
      <div id="projects-menu" hidden></div>
    </div>
    <input type="text" id="project-input" placeholder="Project ID (UUID)">
    <button id="connect-btn">Connect Project</button>
    <button id="open-project-btn" disabled>Open Project</button>
    <span id="auth-status" style="color: #aaa; font-size: 13px; margin-left: auto;">Status: Offline Mode</span>
  </div>

  <div id="main-content">
    <!-- LEFT SIDE: The Code Editor -->
    <div id="left-pane">
      <div class="toolbar">
        <h3>JavaScript Editor</h3>
        <div style="display: flex; gap: 10px;">
          <select id="template-selector" style="background: #111; color: white; border: 1px solid #444; border-radius: 4px; padding: 4px;">
            <option value="offline">Template: Offline UI (NexusUI)</option>
            <option value="online">Template: Cloud Routing (Real Studio)</option>
            <option value="cheatsheet">Template: SDK Cheat Sheet</option>
          </select>
          <button id="run-btn" class="action-btn">Run Code ▷</button>
        </div>
      </div>
      <div id="editor-js"></div>
    </div>

    <!-- RIGHT SIDE: UI & Console -->
    <div id="right-pane">
      <div id="nexus-ui-container"></div>
      <div id="console-output"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
